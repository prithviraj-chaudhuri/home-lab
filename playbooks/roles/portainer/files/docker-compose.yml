version: "3"
services:
  portainer:
    image: portainer/portainer-ce:2.29.0
    container_name: portainer
    ports:
      - 9000:9000
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | grep -q '2328' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.prithvirajchaudhuri.com`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.service=portainer"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  portainer-init:
    image: alpine:3.19
    container_name: portainer-init
    restart: "no"
    depends_on:
      portainer:
        condition: service_healthy
    networks:
      - traefik
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./init.sh:/init.sh:ro

networks:
  traefik:
    external: true

volumes:
  portainer_data: