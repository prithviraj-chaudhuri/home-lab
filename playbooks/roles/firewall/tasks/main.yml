- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Allow everything and enable UFW
  community.general.ufw:
    state: enabled
    policy: allow

- name: Set logging
  community.general.ufw:
    logging: 'on'

- name: Enable ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 22
    - 80
    - 443

- name: Enable Applications
  community.general.ufw:
    rule: allow
    name: "{{ item }}"
  loop:
    - OpenSSH

- name: Deny everything and enable UFW
  community.general.ufw:
    state: enabled
    policy: deny